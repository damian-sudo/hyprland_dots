# Ignore maximize requests from apps. You'll probably like this.
windowrulev3 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev3 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

#Notifaction rules for swaync.
windowrulev3 = float, class:^(swaync-control-center|swaync-notification-window|swaync-client)$
windowrulev3 = pin, class:^(swaync-control-center|swaync-notification-window|swaync-client)$

# gamestore tags
windowrule = match:class ^([Ss]team)$, tag +gamestore
windowrule = match:title ^([Ll]utris)$, tag +gamestore
windowrule = match:class ^(com.heroicgameslauncher.hgl)$, tag +gamestore


#Picture in Picture
windowrule {
    name = Picture-in-Picture
    match:title = ^(Picture-in-Picture)$
    float = on
    move = 72% 7%
    opacity = 1.0 1.0
    pin = on
    keep_aspect_ratio = on
    size = (monitor_w*0.3) (monitor_h*0.3)
}

# Thunar copy progress dialog
windowrule {
    name = Thunar-Progress-bar
    match:class = ^(thunar)$
    match:title = ^(File Operation Progress)$
    float = on
    center = on
    size = (monitor_w*0.26) (monitor_h*0.18)
}
